image: rust:1-slim-bookworm

stages:
  - build

job:
  stage: build
  script:
    - uname -a
    - DEBIAN_FRONTEND=noninteractive apt-get update -y
    - DEBIAN_FRONTEND=noninteractive apt-get install -y openssl libssl-dev sqlite3 libsqlite3-dev libsodium-dev libsodium23 build-essential
    - RUST_BACKTRACE=1 cargo test
    - cargo build --release
  artifacts:
    paths:
      - target/release/clubstatusd
